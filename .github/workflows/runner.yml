name: runner
# On-demand queue drain: registers an EPHEMERAL self-hosted runner (labels:
# self-hosted,linux) to each repo named in the RUNNER_TARGETS secret
# (comma-separated owner/name), runs queued jobs until the queue is empty,
# then deregisters. Hosted public-repo minutes = free. Nothing identifying
# lives in this file: targets and token are secrets; logs print indices only.
on:
  workflow_dispatch:
permissions: {}
concurrency:
  group: runner
  cancel-in-progress: false
jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: drain queues
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          TARGETS: ${{ secrets.RUNNER_TARGETS }},${{ secrets.WAKE_RUNNER_TARGETS }}
        run: |
          set -euo pipefail
          [ -n "${GH_PAT:-}" ] || { echo "secret GH_PAT missing"; exit 1; }
          TARGETS="$(echo "$TARGETS" | tr ',' '\n' | sed '/^ *$/d' | sort -u | paste -sd, -)"
          [ -n "${TARGETS:-}" ] || { echo "no runner targets set (RUNNER_TARGETS / WAKE_RUNNER_TARGETS)"; exit 1; }
          api() { curl -sf -H "Authorization: Bearer $GH_PAT" -H "Accept: application/vnd.github+json" "$@"; }
          VER=$(api "https://api.github.com/repos/actions/runner/releases/latest" | python3 -c 'import json,sys; print(json.load(sys.stdin)["tag_name"].lstrip("v"))')
          echo "runner version: $VER"
          curl -fsSL -o r.tgz "https://github.com/actions/runner/releases/download/v${VER}/actions-runner-linux-x64-${VER}.tar.gz"
          mkdir -p rdir && tar xzf r.tgz -C rdir
          i=0
          IFS=',' read -ra RS <<< "$TARGETS"
          for R in "${RS[@]}"; do
            R="$(echo "$R" | tr -d ' ')"; [ -n "$R" ] || continue; i=$((i+1))
            queued() { api "https://api.github.com/repos/$R/actions/runs?status=queued&per_page=1" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("total_count",0))' 2>/dev/null || echo 0; }
            q=$(queued); echo "target $i: $q queued"
            [ "$q" = "0" ] && continue
            REG=$(api -X POST "https://api.github.com/repos/$R/actions/runners/registration-token" | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])') \
              || { echo "target $i: registration token refused (PAT scope)"; continue; }
            ( cd rdir && ./config.sh --unattended --replace --disableupdate \
                --url "https://github.com/$R" --token "$REG" \
                --name "drain-$i" --labels "self-hosted,linux" --work _w 2>&1 | grep -aiE "error|fail|invalid|http|success" | head -4 )
            sleep 8
            ( cd rdir && env -i HOME="$HOME" PATH="$PATH" USER="$(whoami)" bash -c 'timeout 45m ./run.sh' 2>&1 | grep -aiE "listening|running|job completed|completed with result|error|fail" | head -60 ) || true
            REM=$(api -X POST "https://api.github.com/repos/$R/actions/runners/remove-token" | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])' 2>/dev/null || true)
            [ -n "${REM:-}" ] && ( cd rdir && ./config.sh remove --token "$REM" >/dev/null 2>&1 || true )
            echo "target $i: listener done, $(queued) queued"
          done
          echo "drain complete"
